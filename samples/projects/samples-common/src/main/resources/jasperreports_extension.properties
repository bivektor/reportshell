# suppress inspection "UnusedProperty" for whole file

# Register the FILE repository service registry factory (RepositoryService)
net.sf.jasperreports.extension.registry.factory.file.repository=net.sf.jasperreports.repo.FileRepositoryServiceExtensionsRegistryFactory

# Register the FILE persistence service registry factory (PersistenceServiceFactory)
net.sf.jasperreports.extension.registry.factory.file.persistence=net.sf.jasperreports.repo.FileRepositoryExtensionsRegistryFactory

# Root folder where JR looks for resources (reports, subreports, images, etc.)
# Use an absolute path or a path resolvable in your runtime environment.
net.sf.jasperreports.extension.file.repository.root=../../reports

# Optional: if a resource isn't found under the repository root, allow resolving it as an absolute path
net.sf.jasperreports.extension.file.repository.resolve.absolute.path=false